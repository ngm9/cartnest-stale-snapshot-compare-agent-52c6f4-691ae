services:
  postgres:
    image: postgres:16
    container_name: cartnest_compare_pg
    environment:
      POSTGRES_USER: cartnest
      POSTGRES_PASSWORD: cartnest_pw
      POSTGRES_DB: cartnest_compare
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./init_database.sql:/docker-entrypoint-initdb.d/init_database.sql:ro
      - cartnest_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartnest -d cartnest_compare"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cartnest_pg_data:
